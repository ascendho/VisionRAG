<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision RAG</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231a73e8'%3E%3Cpath d='M12 2l2.5 7.5H22l-6 4.5 2.5 7.5L12 17l-6 4.5 2.5-7.5L2 9.5h7.5L12 2z'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css?v=2.4">
</head>
<body id="appBody" class="flex h-screen overflow-hidden bg-gradient-to-br from-[#f8ebfc] via-[#faeff2] to-[#fffee0] dark:from-slate-900 dark:via-slate-800 dark:to-slate-900 transition-colors transition-all duration-700">

  <!-- Main Chat Area -->
  <main id="appMain" class="flex-1 flex flex-col h-full relative transition-all duration-700">
    <header class="flex justify-between items-center px-4 md:px-8 py-4 h-[64px]">
      <div class="flex items-center cursor-pointer transition-transform hover:scale-[1.02]" onclick="resetUI()">
        <span class="text-[22px] font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-[#4285f4] via-[#9b72cb] to-[#d96570]">VisionRAG</span>
      </div>
      
      <div class="flex items-center gap-2">
        <button onclick="toggleTheme()" class="p-2.5 rounded-full text-gray-500 hover:bg-gray-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors" title="切换深色/浅色模式">
          <!-- Sun Icon (shows in dark mode) -->
          <svg class="w-5 h-5 hidden dark:block" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <!-- Moon Icon (shows in light mode) -->
          <svg class="w-5 h-5 block dark:hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>  

        <button onclick="openFilesModal()" class="flex items-center gap-2.5 px-4 py-2.5 text-[17px] font-bold text-[#444746] dark:text-slate-300 hover:bg-[#e8f0fe] dark:hover:bg-slate-800 hover:text-[#1a73e8] dark:hover:text-blue-400 rounded-xl transition-colors group">
          <svg class="w-[22px] h-[22px] text-[#1a73e8] dark:text-blue-400 group-hover:text-[#174ea6] dark:group-hover:text-blue-300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span class="mt-[-1px]">已加载文档</span>
        </button>
      </div>
    </header>

    <div class="flex-1 flex flex-col overflow-y-auto px-4 md:px-8 xl:px-12 pt-6" id="messagesContainer">
      <div class="flex-1 shrink-0 max-w-[850px] mx-auto w-full flex flex-col relative">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="flex-1 flex flex-col justify-center items-center text-center max-w-[850px] mx-auto w-full pb-[20vh]">
          <div class="mb-8 flex flex-col items-center">
            <div class="mb-4">
            <svg class="w-14 h-14" fill="url(#sparkle-grad)" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4285f4" />
                  <stop offset="50%" stop-color="#9b72cb" />
                  <stop offset="100%" stop-color="#d96570" />
                </linearGradient>
              </defs>
              <path d="M12 2.628c-.896 5.867-5.505 10.476-11.372 11.372 5.867.896 10.476 5.505 11.372 11.372.896-5.867 5.505-10.476 11.372-11.372-5.867-.896-10.476-5.505-11.372-11.372z"/>
            </svg>
          </div>
          <h1 class="text-[40px] md:text-[56px] font-semibold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-500 via-purple-500 to-rose-400 mb-2 leading-tight">
            你好
          </h1>
          <p class="text-3xl md:text-3xl text-[#c4c7c5] dark:text-slate-400 font-medium tracking-tight mt-2">
            上传文档，开启多模态视觉检索
          </p>
        </div>
      </div>
      
      <!-- Actual Chat Messages -->
      <div id="chatHistory" class="w-full mx-auto space-y-8 pb-56 md:pb-64 hidden">
        <!-- JS inserts bubbles here -->
      </div>
    </div>
    </div>

    <!-- Input Bar -->
    <div id="inputContainer" class="absolute bottom-0 left-0 z-10 right-0 p-4 md:px-8 xl:px-12 md:pb-8 pt-10 transform transition-transform duration-700 ease-[cubic-bezier(0.2,1,0.2,1)] -translate-y-[25vh] md:-translate-y-[30vh]">
      <div class="max-w-[850px] mx-auto w-full">
        <div id="scopeBar" class="hidden mb-2 flex flex-wrap gap-1.5 px-1"></div>
        <div class="relative bg-transparent rounded-2xl md:rounded-2xl flex items-center px-4 py-[6px] shadow-md transform transition-all group focus-within:shadow-lg focus-within:bg-white dark:focus-within:bg-slate-900 ring-1 ring-gray-200 dark:ring-slate-700 bg-white dark:bg-slate-800">
          
          <label id="uploadBtnLabel" class="p-2 px-3 text-[#444746] dark:text-slate-300 hover:bg-black/5 dark:hover:bg-white/5 rounded-full cursor-pointer flex shrink-0 items-center justify-center mr-2 transition-all duration-300 ease-in-out font-medium text-sm">
            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span id="uploadBtnText" class="ml-1.5 w-[60px] opacity-100 whitespace-nowrap overflow-hidden transition-all duration-300">上传文档</span>
            <input type="file" id="bottomFileInput" accept="application/pdf,application/vnd.openxmlformats-officedocument.presentationml.presentation,.pptx,image/png,image/jpeg,image/webp" class="hidden">
          </label>
          
          <input
            type="text"
            id="queryInput"
            placeholder="💡 请先点击左侧上传 PDF、图片或 PPTX 文档..."
            class="flex-1 bg-transparent border-none focus:outline-none text-[#1f1f1f] dark:text-slate-200 px-1 py-3 text-[15px] placeholder:text-[#444746]/70 dark:placeholder:text-slate-400 leading-normal"
          />
          
          <button id="sendBtn" class="p-2.5 text-white rounded-full shrink-0 flex items-center justify-center bg-gradient-to-r from-blue-500 to-blue-600 disabled:opacity-50">
            <svg class="w-5 h-5 mx-auto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </div>
        <div class="text-center mt-3 text-[11px] text-[#444746] dark:text-slate-500 font-medium tracking-wide">
          Powered by ColPali · FastAPI & Qdrant · AI outputs can make mistakes. Please double check.
        </div>
      </div>
    </div>
  </main>

  <!-- Lightbox Modal -->
  <div id="imageModal" class="fixed inset-0 z-50 bg-black/80 hidden items-center justify-center p-4 md:p-8 backdrop-blur-sm transition-opacity opacity-0 cursor-pointer" onclick="closeImageModal()">
    <div class="relative max-w-full max-h-full">
      <div class="relative inline-block" onclick="event.stopPropagation()">
        <img id="modalImage" src="" class="block max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl">
      </div>
      <button class="absolute -top-4 -right-4 p-2 bg-white/10 hover:bg-white/20 rounded-full text-white backdrop-blur-md transition-colors" onclick="closeImageModal()" title="关闭">
        <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <!-- Files Modal -->
  <div id="filesModal" class="fixed inset-0 z-40 bg-black/20 hidden items-center justify-center p-4 backdrop-blur-sm transition-opacity opacity-0" onclick="closeFilesModal()">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl w-full max-w-xl overflow-hidden transform transition-all scale-95 opacity-0" id="filesModalContent" onclick="event.stopPropagation()">
      <div class="px-6 py-4 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center">
        <h3 class="text-lg font-semibold text-[#1f1f1f] dark:text-slate-200">已加载文档</h3>
        <button class="p-1 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full text-gray-500 dark:text-slate-400 transition-colors" onclick="closeFilesModal()">
          <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="p-6 max-h-[60vh] overflow-y-auto" id="filesList">
        <div class="flex justify-center py-4">
          <div class="w-5 h-5 border-2 border-[#1a73e8] dark:border-blue-400 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js?v=2.4"></script>
</body>
</html>
